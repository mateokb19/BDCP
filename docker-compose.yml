services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bdcpolo
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: bdcpolo123
      TZ:                America/Bogota
      PGTZ:              America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdcpolo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "28000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:bdcpolo123@db:5432/bdcpolo
      TZ:           America/Bogota
    depends_on:
      db:
        condition: service_healthy

  # ── Vite frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "28001:5173"
    environment:
      # Si accedes desde otra PC en la red, cambia localhost por la IP del servidor
      VITE_API_URL: http://localhost:28000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_modules:
