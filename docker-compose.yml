services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       bdcpolo
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: bdcpolo123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdcpolo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:bdcpolo123@db:5432/bdcpolo
    depends_on:
      db:
        condition: service_healthy

  # ── Vite frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_modules:
